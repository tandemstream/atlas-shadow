synthesis_oracle:
  ideal_conclusion: >
    Content dedup should use a sidecar canonical/carrier pattern rather
    than rewriting artifact_chunks identity: preserve artifact_chunks and
    code_chunk_refs behavior, add canonical chunk identity beside it, and
    update all writer/reader surfaces deliberately.
  required_points:
    - id: S1
      text: Preserve artifact_chunks as the carrier table.
    - id: S2
      text: Reuse the documents/document_carriers canonical/carrier precedent.
    - id: S3
      text: Include chunk_artifact and code_chunker writer paths.
    - id: S4
      text: Respect code_chunk_refs.chunk_id primary-key constraints.
    - id: S5
      text: Treat embedding reuse and retrieval-collapse as the real value, not storage savings alone.
  forbidden_claims:
    - id: F1
      text: artifact_chunks can be row-shared directly without changing readers.
    - id: F2
      text: code_chunk_refs already supports multiple carriers per chunk_id.
