schema_version: 1
packet_id: 2026-05-13-lookup-subagent-pattern-v1
title: Lookup subagent pattern layered-grading sanity pilot
strict_subcriteria_pilot:
  status: pilot_v1
  applied_2026_05_21: true
  note: >
    Second packet converted to the strict-subcriteria shape (after PR #38
    which converted 2026-05-14-atlas-doc-section-expansion-v1).
    Synthesis criteria decomposed into binary (1pt) named subcriteria, each
    anchored to one or more supporting qids from `evidence_oracle.rows`
    OR explicitly marked `scoreable: context_only` (no instance of the
    latter in this pilot — every subcriterion is qid-anchored). Negative
    bars (F1, F2) rewritten as positive required behaviors.
    PARENT-POINT NOTE: the `uncertainty` criterion is expanded from
    points_possible=1 to points_possible=2 to eliminate the original
    0.5/1 fractional atlas score. Two binary subcriteria carry the split
    (`external_restrictions_caveat` covered, `live_verification_caveat`
    missed) — atlas effectively scores the same 50% on uncertainty as
    before, but via two clean 1pt binary calls instead of a single
    half-credit. Other criteria's parent points_possible are unchanged.
    Total parent points_possible thus moves from 9 to 10; full delta
    is reported in the originating PR's body.

