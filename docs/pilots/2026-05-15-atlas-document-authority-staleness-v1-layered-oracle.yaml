strict_subcriteria_pilot:
  status: pilot_v1
  applied_2026_05_21: true
  note: >
    Fourth packet converted to the strict-subcriteria shape (after PR
    #38, #42, #44). Different task class from the prior three: doc
    authority / stale context / policy judgment rather than code
    retrieval mechanics.
    READINESS REPAIR: pre-pilot had `required_point_id` tags only on
    S1 (every required-point row references S1, none reference S2/S3).
    Readiness was 1/3 = 33.3% with two `no_supporting_rows` warnings.
    Repaired by extending existing rows' `required_point_ids` arrays
    where the row's notes already substantiate the point — NO new
    evidence invented:
      q4  += S2   (q4's note: "CodePack report exposes adjacent-document
                   tiers" = the staleness-as-tier mechanism)
      q7  += S2   (q7's note: "evidence lookup ranks CodePack
                   contamination tiers" = the contamination-as-staleness
                   surfacing)
      q9  += S3   (q9's note: "code-reference lookup defaults to runtime
                   behavior" = exactly S3's "preserve code-reference
                   lookup defaults")
      q10 += S3   (q10's note: "task status is reserved for status rows
                   and task identifiers" = exactly S3's "task/status
                   vocabulary distinctions")
    All other constraints from the prior pilots preserved: binary 1pt
    subcriteria, qid-anchored OR `scoreable: context_only` (no instance
    of the latter here), no fractional points, negative bars F1/F2
    rewritten as positive subcriteria, parent point totals preserved
    exactly.

