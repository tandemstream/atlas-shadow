synthesis_oracle:
  status: hand_authored
  ideal_conclusion: >
    The packet should conclude that canonical evidence requires preserving
    evidence provenance through retrieval, expansion, sweep, and synthesis
    rather than treating final prose as the only artifact.
  required_points:
  - id: S1
    text: The answer must identify canonical evidence as retrieved chunks, expanded blocks, and sweep hits.
  - id: S2
    text: The answer must explain that synthesis prompt construction preserves those evidence sections.
  - id: S3
    text: The answer must call out limits of query-side identifier extraction and unresolved backlog-style evidence.
  - id: S4
    text: The answer must distinguish DB-backed artifact/chunk reads from whole-file line scanning.
  forbidden_claims:
  - id: F1
    text: Do not claim unresolved/context-only rows are verified Atlas evidence.
    rewritten_as:
      positive_subcriterion_id: caveats.unresolved_rows_marked_context
      note: Inverted into "answer must label the unresolved/context-only rows AS unresolved/context-only,"
        scoreable against q2/q3/q4 (representative unresolved-context rows).
  - id: F2
    text: Do not claim the system can prove canonical evidence by final answer prose alone.
    rewritten_as:
      positive_subcriterion_id: synthesis_path.separator_pattern
      note: Inverted into "answer must identify the prompt structural pattern (separator sections in
        user_content) that preserves multi-source provenance through synthesis," scoreable against
        q19. The bar requires citing the structural machinery, not just the final prose.
  uncertainty_notes:
  - id: U1
    text: Several historical receipts are unresolved and should lower confidence, not Atlas correctness.
  - id: U2
    text: Planner evidence failures caused by line drift should be separated from retrieval failures.
  criteria:
  - id: conclusion
    label: Canonical-evidence conclusion
    points_possible: 1
    planner_points: 1
    atlas_points: 1
    notes: Both should frame canonical evidence as provenance-preserving substrate.
    subcriteria:
    - id: conclusion.provenance_preserving_substrate
      text: >
        Answer must conclude that canonical evidence is a provenance-
        preserving substrate (retrieved chunks + expanded blocks + sweep
        hits + DB-backed artifact reads), NOT treating the final synthesis
        answer prose as the only artifact.
      points: 1
      supporting_qids: [q5, q9, q14, q19, q20]
      required_point_id: S1
      planner_status: covered
      atlas_status: covered
  - id: evidence_surfaces
    label: Evidence surfaces named
    points_possible: 4
    planner_points: 2
    atlas_points: 3
    planner_miss_class: current_benchmark_line_drift
    atlas_miss_class: evidence_missing
    notes: >
      Decomposed from monolithic 4pt criterion into 4 binary subcriteria,
      one per surface. The planner-2-of-4 / atlas-3-of-4 split follows the
      original author's miss-class (planner failed on
      `current_benchmark_line_drift` = expansion-specific surfaces; atlas
      missed the newest surface, sweep_hits). Should be re-validated
      against a real synthesis answer.
    subcriteria:
    - id: evidence_surfaces.retrieved_chunks
      text: >
        Answer must name retrieved chunks (output of `find_code` / scan
        retrieval) as the first canonical evidence surface.
      points: 1
      supporting_qids: [q5, q6]
      required_point_id: S1
      planner_status: covered
      atlas_status: covered
    - id: evidence_surfaces.expanded_blocks
      text: >
        Answer must name expanded blocks (packet-4 evidence-expansion
        mechanism with `ExpansionCaps` + `ATLAS_EVIDENCE_EXPANSION` knob)
        as the second canonical evidence surface — distinct from raw
        retrieved chunks.
      points: 1
      supporting_qids: [q12, q13]
      required_point_id: S1
      planner_status: missed
      planner_miss_class: current_benchmark_line_drift
      atlas_status: covered
    - id: evidence_surfaces.sweep_hits
      text: >
        Answer must name sweep hits (the broader corpus-wide DB-backed
        scan complementing retrieval) as the third canonical evidence
        surface — distinct from the retrieval surfaces above.
      points: 1
      supporting_qids: [q14]
      required_point_id: S1
      planner_status: missed
      planner_miss_class: current_benchmark_line_drift
      atlas_status: missed
      atlas_miss_class: evidence_missing
    - id: evidence_surfaces.db_backed_artifact_reads
      text: >
        Answer must name DB-backed artifact/chunk reads (the
        `artifact_chunks ac JOIN artifacts a` shape with
        `a.doc_id` / `a.source_channel` filters) as the storage substrate
        that all the above surfaces share — distinct from whole-file
        line scans or git-grep style.
      points: 1
      supporting_qids: [q20]
      required_point_id: S4
      planner_status: covered
      atlas_status: covered
  - id: synthesis_path
    label: Synthesis path preserved
    points_possible: 2
    planner_points: 1
    atlas_points: 2
    planner_miss_class: evidence_present_answer_missed
    notes: >
      Decomposed from monolithic 2pt criterion into 2 binary subcriteria:
      prompt construction (the load-bearing seam) and separator pattern
      (the structural mechanism that preserves provenance). Original
      planner 1/2 preserved on the prompt_construction sub (covered);
      separator_pattern missed (per the author's
      `evidence_present_answer_missed` note + the F2 rewrite path that
      makes this bar explicit).
    subcriteria:
    - id: synthesis_path.prompt_construction
      text: >
        Answer must name `core/ai.py:synthesize` (or equivalent prompt-
        construction seam) as the load-bearing synthesis step that
        builds `user_content` from evidence sections — i.e., identify
        WHERE evidence-to-prompt translation lives.
      points: 1
      supporting_qids: [q5, q9]
      required_point_id: S2
      planner_status: covered
      atlas_status: covered
    - id: synthesis_path.separator_pattern
      text: >
        Answer must identify the separator pattern in `user_content`
        (multiple evidence sections compose without new prompt re-shape)
        as the structural mechanism that preserves multi-source
        provenance through synthesis. Positive rewrite of F2 ("don't
        claim canonical evidence is proven by final answer prose alone")
        — the bar is naming the structural machinery, not just the prose.
      points: 1
      supporting_qids: [q19]
      required_point_id: S2
      planner_status: missed
      planner_miss_class: evidence_present_answer_missed
      atlas_status: covered
  - id: caveats
    label: Drift and unresolved caveats (positive rewrite)
    points_possible: 2
    planner_points: 1
    atlas_points: 1
    planner_miss_class: evidence_present_answer_missed
    atlas_miss_class: evidence_present_answer_missed
    notes: >
      REWRITTEN. Original criterion: "Both answers must avoid over-
      claiming unresolved historical rows" — negative bar. Reframed
      into two positive named behaviors: (a) label unresolved/context-
      only rows as such (replaces F1), and (b) separate planner's
      line-drift evidence failures from real retrieval failures
      (positive form of U2). Both actors covered (a) but missed (b)
      per the original miss-class — line-drift-vs-retrieval-failure
      distinction is subtler and easier to elide.
    subcriteria:
    - id: caveats.unresolved_rows_marked_context
      text: >
        Answer must label the packet's unresolved/context-only rows
        (e.g., q2, q3, q4, q7, q8, q10) as context-only assumptions,
        NOT as verified Atlas retrieval evidence. Positive rewrite of
        F1.
      points: 1
      supporting_qids: [q2, q3, q4, q7]
      required_point_id: S3
      planner_status: covered
      atlas_status: covered
    - id: caveats.line_drift_separated_from_retrieval_failure
      text: >
        Answer must distinguish planner-side `current_benchmark_line_drift`
        / `receipt_hash_mismatch` evidence failures (the receipt's
        commit anchor drifted from the run-commit, NOT Atlas missing
        the content) from real retrieval failures. Positive rewrite of
        U2.
      points: 1
      supporting_qids: [q12, q13, q20]
      required_point_id: S3
      planner_status: missed
      planner_miss_class: evidence_present_answer_missed
      atlas_status: missed
      atlas_miss_class: evidence_present_answer_missed
