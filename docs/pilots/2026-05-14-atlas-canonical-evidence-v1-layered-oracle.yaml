strict_subcriteria_pilot:
  status: pilot_v1
  applied_2026_05_21: true
  note: >
    Third packet converted to the strict-subcriteria shape (after PR #38
    + PR #42). Synthesis criteria decomposed into binary (1pt) named
    subcriteria, each anchored to one or more supporting qids OR
    explicitly marked `scoreable: context_only` (no instance of the
    latter in this pilot — every subcriterion is qid-anchored). Negative
    bars (F1, F2) rewritten as positive required behaviors with
    `rewritten_as` audit-trail pointers.
    READINESS REPAIR: the pre-pilot rubric had `required_point_id` tags
    only on S1 — every row that referenced a required point referenced
    S1. S2, S3, S4 had zero supporting rows (readiness 1/4 = 25%, three
    `no_supporting_rows` warnings). This is repaired by extending
    existing rows' `required_point_ids` arrays to also reference S2/S3/S4
    where the row's notes directly describe what the required point
    asks for — NO new evidence is invented; only existing rows get
    additional point tags where their existing notes already substantiate
    the point. Specifically:
      q1  += S3   (q1 already describes "query-side identifier extraction
                   today — only structured anchors, no Q-ID / err-msg
                   sweep" — exactly S3's "limits of query-side identifier
                   extraction")
      q5  += S2   (q5 already describes "synthesis prompt path —
                   core/ai.py:synthesize builds user_content" — exactly
                   S2's "synthesis prompt construction preserves evidence
                   sections")
      q9  += S2   (q9 already describes "synthesis prompt template —
                   _SYNTH_SYSTEM is a single multi-line constant" —
                   prompt-template anchor for S2)
      q14 += S4   (q14 already describes "sweep mechanism — git grep
                   style not used today; must use DB-backed
                   artifact_chunks.raw_text scan" — exactly S4's "DB-
                   backed artifact/chunk reads vs whole-file line
                   scanning". Note: q14 is `oracle_bucket: command` so
                   readiness would report `command_only_support` for S4
                   if q14 were the sole supporter; q20 below provides
                   verified evidence support so S4 lands as fully
                   supported.)
      q20 += S4   (q20 already describes "non-code DB read shape —
                   artifact_chunks ac JOIN artifacts a... filter via
                   a.doc_id / a.source_channel" — exactly the DB-read
                   shape for S4)
    Parent-criterion fields (`points_possible`, `planner_points`,
    `atlas_points`) remain populated for backward-compat with
    `atlas_shadow/ingest_daemon/layered_report.py`; subcriteria are
    silently ignored by the existing reader.

