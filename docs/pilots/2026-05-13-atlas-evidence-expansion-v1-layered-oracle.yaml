synthesis_oracle:
  ideal_conclusion: >
    Evidence expansion should proceed as an additive retrieval-to-synthesis
    layer: preserve existing citation envelopes, expand only around explicit
    anchors, enforce hard caps, and treat absence or removed-playground claims
    as non-Atlas retrieval evidence.
  required_points:
    - id: S1
      text: Preserve source paths and line ranges through find_code citations.
    - id: S2
      text: Do not claim scan_search citations are as rich as find_code citations.
    - id: S3
      text: Account for prompt context caps and per-chunk truncation.
    - id: S4
      text: Use artifact chunk ordering and offsets for full-file reconstruction.
    - id: S5
      text: Restrict expansion to explicit path, symbol, and literal anchors.
    - id: S6
      text: Respect current code_symbols.kind values; exception classes are classes.
  forbidden_claims:
    - id: F1
      text: Existing markdown chunking already emits structured heading metadata.
    - id: F2
      text: expanded_context was already an established answer-envelope field.
    - id: F3
      text: Removed playground Atlas/memory receipts are valid Atlas retrieval targets.
  uncertainty_notes:
    - id: U1
      text: Prompt-size and cost tooling was weak at planning time and needs measurement.
    - id: U2
      text: Historical playground evidence is useful context but not a current benchmark target.
  criteria:
    - id: conclusion
      label: Correct conclusion
      points_possible: 1
      planner_points: 1
      atlas_points: 1
      notes: Both should conclude that additive evidence expansion is viable but bounded.
    - id: required_points
      label: Required points covered
      points_possible: 6
      planner_points: 5
      atlas_points: 4
      planner_miss_class: evidence_present_answer_missed
      atlas_miss_class: evidence_missing
      notes: Atlas synthesis is expected to miss some removed/context-only evidence.
    - id: forbidden_claims
      label: Forbidden claims avoided
      points_possible: 3
      planner_points: 2
      atlas_points: 2
      planner_miss_class: rubric_too_vague
      atlas_miss_class: rubric_too_vague
      notes: The packet historically blurred playground context and current Atlas evidence.
    - id: uncertainty
      label: Uncertainty handled
      points_possible: 2
      planner_points: 1
      atlas_points: 1
      planner_miss_class: evidence_present_answer_missed
      atlas_miss_class: evidence_missing
      notes: Cost and removed-source uncertainty need explicit caveats.
