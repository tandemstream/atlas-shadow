synthesis_oracle:
  status: hand_authored
  ideal_conclusion: >
    The packet should conclude that Mattergraph code-pack grading needs a
    compact but representative code corpus with explicit required-claim gold,
    and that provider-free smoke tests validate the harness without measuring
    model retrieval quality.
  required_points:
  - id: S1
    text: The answer must describe the code-pack corpus as a curated retrieval benchmark, not only a smoke fixture.
  - id: S2
    text: The answer must mention required_claims as the gold signal for v3-style grading.
  - id: S3
    text: The answer must distinguish user-context corpus metrics from repo-verifiable evidence.
  forbidden_claims:
  - id: F1
    text: Do not claim provider-free smoke success proves Atlas retrieval quality.
    rewritten_as:
      positive_subcriterion_id: smoke_vs_retrieval.retrieval_quality_not_proven_by_smoke
      note: Inverted into "answer must explicitly note that smoke success does not prove retrieval
        quality," scoreable against q7 (the smoke-test context row).
  - id: F2
    text: Do not count user_context corpus metrics as Atlas evidence.
    rewritten_as:
      positive_subcriterion_id: context_caveat.corpus_loop_metrics_marked_context
      note: Inverted into "answer must label corpus loop metrics (q6) as user-context, distinct from
        repo-verifiable Atlas evidence."
  uncertainty_notes:
  - id: U1
    text: Corpus representativeness remains qualitative until more packets contribute examples.
  criteria:
  - id: conclusion
    label: Corpus benchmark conclusion
    points_possible: 1
    planner_points: 1
    atlas_points: 1
    notes: The intended conclusion is a curated code-pack benchmark with smoke-test guardrails.
    subcriteria:
    - id: conclusion.curated_corpus_with_smoke_guardrails
      text: >
        Answer must conclude that Mattergraph code-pack grading needs
        a curated, representative code corpus with explicit required-
        claim gold AND smoke-test guardrails — i.e., both the
        benchmark and the harness validation are necessary.
      points: 1
      supporting_qids: [q2, q3, q4]
      required_point_id: S1
      planner_status: covered
      atlas_status: covered
  - id: required_claims
    label: Required-claims gold explained
    points_possible: 4
    planner_points: 4
    atlas_points: 2
    atlas_miss_class: evidence_missing
    notes: >
      Decomposed from monolithic 4pt criterion into 4 binary
      subcriteria. The atlas-2-of-4 split follows the original
      `evidence_missing` miss-class — atlas misses the two
      q8-derived subs (q8 is the unresolved `legacy_non_indexed_fixture`
      JSONL anchor that the atlas-shadow legacy-correction sidecar #35
      already handles). Should be re-validated against a real
      synthesis answer.
    subcriteria:
    - id: required_claims.code_pack_corpus_purpose
      text: >
        Answer must explain that the code-pack corpus exists to
        ground retrieval testing on real code (CodePack boundary +
        v3/v2 runners), not just as a smoke fixture.
      points: 1
      supporting_qids: [q2, q3, q4]
      required_point_id: S1
      planner_status: covered
      atlas_status: covered
    - id: required_claims.v3_runner_loads_queries_jsonl
      text: >
        Answer must name the v3 runner as the consumer of the
        queries.jsonl gold file (the path from corpus to grading
        signal lives at the runner, not at the smoke harness).
      points: 1
      supporting_qids: [q3]
      required_point_id: S2
      planner_status: covered
      atlas_status: covered
    - id: required_claims.required_claims_field_in_v3_queries
      text: >
        Answer must reference the `required_claims` field as the
        gold signal in v3 queries — the specific per-query oracle
        bar that v3-style grading depends on.
      points: 1
      supporting_qids: [q8]
      required_point_id: S2
      planner_status: covered
      atlas_status: missed
      atlas_miss_class: evidence_missing
    - id: required_claims.legacy_fixture_constraint_acknowledged
      text: >
        Answer must acknowledge that the `queries.jsonl` fixture
        anchoring required_claims is tracked in git but NOT indexed
        in Atlas's SCIP code corpus (legacy_non_indexed_fixture) —
        so Atlas retrieval cannot directly cite the fixture, and
        the atlas-shadow legacy-correction sidecar handles the q8
        receipt. This is the same root-cause class as the q8 receipt
        diagnostic.
      points: 1
      supporting_qids: [q8]
      required_point_id: S2
      planner_status: covered
      atlas_status: missed
      atlas_miss_class: evidence_missing
  - id: smoke_vs_retrieval
    label: Smoke tests separated from retrieval
    points_possible: 2
    planner_points: 1
    atlas_points: 1
    planner_miss_class: evidence_present_answer_missed
    atlas_miss_class: evidence_present_answer_missed
    notes: >
      Decomposed from monolithic 2pt criterion into 2 binary
      subcriteria. Both actors miss `retrieval_quality_not_proven_by_smoke`
      (the F1 positive rewrite) — the explicit-disclaimer bar is
      subtler than the basic mechanics-vs-quality framing. Preserves
      original 1/2 split for both actors.
    subcriteria:
    - id: smoke_vs_retrieval.smoke_validates_harness_mechanics
      text: >
        Answer must note that provider-free smoke tests (q7 = "v2
        no-gold smoke completed without provider calls") validate
        harness wiring — i.e., the integration plumbing works
        end-to-end without a model.
      points: 1
      supporting_qids: [q7]
      required_point_id: S1
      planner_status: covered
      atlas_status: covered
    - id: smoke_vs_retrieval.retrieval_quality_not_proven_by_smoke
      text: >
        Answer must explicitly note that smoke success does NOT
        prove retrieval quality (smoke is about mechanics; quality
        requires gold-graded queries). Positive rewrite of F1.
      points: 1
      supporting_qids: [q7]
      required_point_id: S1
      planner_status: missed
      planner_miss_class: evidence_present_answer_missed
      atlas_status: missed
      atlas_miss_class: evidence_present_answer_missed
  - id: context_caveat
    label: User-context caveat (positive rewrite)
    points_possible: 2
    planner_points: 2
    atlas_points: 2
    notes: >
      Decomposed from monolithic 2pt criterion into 2 binary
      subcriteria, both positive named behaviors. Original criterion
      framing was already positive ("Corpus loop metrics are useful
      context but not Atlas evidence"); F2 is the negative form that
      both subcriteria together replace. Both actors fully covered.
    subcriteria:
    - id: context_caveat.checkout_context_marked
      text: >
        Answer must note that the "current checkout is core" framing
        (q1) is user-context — i.e., a runtime/operator assumption,
        not an evidence claim Atlas can independently verify.
      points: 1
      supporting_qids: [q1]
      required_point_id: S3
      planner_status: covered
      atlas_status: covered
    - id: context_caveat.corpus_loop_metrics_marked_context
      text: >
        Answer must label corpus loop metrics (q6 = "corpus loop
        metrics justify packetization") as user-context, distinct
        from repo-verifiable Atlas evidence. Positive rewrite of F2.
      points: 1
      supporting_qids: [q6]
      required_point_id: S3
      planner_status: covered
      atlas_status: covered
