    text: The answer must describe the code-pack corpus as a curated retrieval benchmark, not only a smoke fixture.
  - id: S2
    text: The answer must mention required_claims as the gold signal for v3-style grading.
  - id: S3
    text: The answer must distinguish user-context corpus metrics from repo-verifiable evidence.
