strict_subcriteria_pilot:
  status: pilot_v1
  applied_2026_05_21: true
  note: >
    Fifth packet converted to the strict-subcriteria shape (after PRs
    #38, #42, #44, #46). First non-doc, code-pack/corpus task class —
    broadens gold synthesis coverage beyond the doc-section /
    canonical-evidence / document-authority cluster.
    READINESS REPAIR: pre-pilot had required_point_ids tags only on
    S1 (every required-point row referenced S1; S2, S3 had no
    supporting rows). Readiness was 1/3 = 33.3% with 2
    `no_supporting_rows` warnings. Repaired by extending existing
    rows' required_point_ids arrays where the row's notes already
    substantiate the point — NO new evidence invented:
      q3  += S2   (q3 is the verified v3-runner row; the v3 runner is
                   the consumer of the required_claims field. Honest
                   anchor for "required_claims as gold signal for
                   v3-style grading.")
      q6  += S3   (q6 is the verified-context row about corpus loop
                   metrics — the user-context surface that S3 asks
                   the answer to distinguish from repo-verifiable
                   evidence. Context row → gives `context_only_support`
                   warning, not `no_supporting_rows`. S3 is by-design
                   about context classification.)
      q8  += S2   (q8 is the queries.jsonl required_claims row that
                   is the original anchor; unresolved so doesn't
                   support readiness on its own — q3 above does — but
                   tagging preserves the audit trail.)
    Same other constraints from prior pilots: binary 1pt subcriteria,
    qid-anchored OR scoreable: context_only (no instance of the
    latter here — every subcriterion is qid-anchored), no fractional
    points, negative bars F1/F2 rewritten as positive subcriteria,
    parent point totals preserved exactly.

