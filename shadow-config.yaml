# atlas-shadow runtime configuration
#
# Names the org(s) and grader model used by `make shadow-run`. No defaults
# in Python code — this file is the single source of truth.

# Default-mode target. Atlas-shadow queries Atlas under this org id. As
# of D5 v2 (2026-05-14), this is a DEDICATED continuous-shadow org
# (name=atlas_continuous_shadow, distinct prefix from atlas_shadow_*
# per-commit orgs to avoid purge-orphans collision). Populated by the
# ingest daemon in atlas_shadow.ingest_daemon; the daemon writes
# .daemon-state.json with the freshest code_revision_id, and the runner
# reads that file first, falling back to continuous_shadow_code_revision_id
# below when the state file is absent.
#
# Historical: prior to D5, this pointed at the dogfood org
# 3ec689a0-678b-47ed-af17-a72e5adbfad8 (pinned-but-stale at commit
# 87aa9fa). That org still exists for D4 out-of-band benchmark use.
continuous_shadow_org_id: "393c7e00-d50e-45dd-a877-3bf62b9fdb2d"

# Optional template org id for out-of-band ingest setup. If unset, the D4
# ingester creates a fresh org via `workspace run org-create NAME=<auto>`.
one_off_template_org_id: null

# Path to a working tandemstream/core checkout with the Atlas venv
# bootstrapped (`workspace up` from the Atlas leaf has been run). The
# runner shells out from `<core_repo_path>/products/tandem/packages/python/atlas`.
core_repo_path: "/Users/ray/tandemstream/core--atlas"

# LLM-as-judge model. With the Anthropic SDK backend, reads
# ANTHROPIC_API_KEY from the environment. When the grader falls back to
# the `claude` CLI (no API key), the value passed as --model must be
# resolvable by Claude Code; "sonnet" / "opus" / "haiku" aliases work,
# or an exact model id the CLI accepts. The CLI fallback engages
# automatically when ANTHROPIC_API_KEY is unset; force it via
# ATLAS_SHADOW_GRADER_BACKEND=claude_cli.
grader_model: "sonnet"

# Default principal id used by find_code/scan_search calls. Mirrors the
# dogfood reference's DEFAULT_PRINCIPAL_ID. The wrapper has its own default
# (this is just where atlas-shadow records its intended principal).
default_principal_id: "00000000-0000-4000-8000-000000000222"

# Pinned code revision id for the continuous shadow org (optional fallback).
# The ingest daemon writes .daemon-state.json with the freshest revision id
# after each successful ingest; the runner reads that file first and only
# falls back to this key when the state file is absent. Set to null so a
# missing state file produces a clean error rather than silently routing
# queries to a stale dogfood revision.
continuous_shadow_code_revision_id: null

# --- Continuous-ingest daemon (D5) settings -------------------------------
#
# Additive section read by atlas_shadow.ingest_daemon.config.load_config.
# All keys have defaults; this block exists to document them and pin local
# values. The daemon is OFF by default — start it with `make ingest-up`
# (foreground) or `make ingest-up-detached` (background).
ingest_daemon:
  # Bind address + port for the FastAPI receiver. The GitHub webhook
  # delivery should target http://<host>:<port>/webhook (typically behind
  # an HTTPS tunnel for production; v1 is dev/local).
  host: "127.0.0.1"
  port: 8765

  # Where the daemon keeps its SQLite DB. The schema is applied
  # idempotently on `make ingest-bootstrap` or first `serve`.
  db_path: "~/.atlas-shadow/ingest.db"

  # Where the daemon clones tandemstream/core and produces SCIP blobs.
  # Two subdirs are auto-created:
  #   core/         — the long-lived clone (git fetch on each tick)
  #   worktrees/    — per-commit worktrees for SCIP builds
  #   scip/         — SCIP blobs ready for ingest
  cache_dir: "~/.atlas-shadow/cache"

  # Daemon-state file written atomically after each successful ingest.
  # Relative paths are resolved against the directory of this config file
  # (so this default sits next to shadow-config.yaml).
  state_file: ".daemon-state.json"

  # SCIP indexer version (informational; recorded in scip_uploads rows).
  scip_indexer_version: "scip-python@0.6.6"
  pack_bundle_revision: "code@v1"

  # GitHub repo to clone + ingest.
  core_repo_url: "https://github.com/tandemstream/core.git"

  # Repo URL passed to the dogfood ingest CLI's --repo-url flag (D5 v2
  # follow-on). This becomes part of Atlas's idempotency cache key
  # (org_id, repo_url, commit_sha, indexer_version). Distinct from
  # core_repo_url above (which has the .git suffix for git clone);
  # the cache key is a plain string match and the canonical form (no
  # .git) is what downstream Atlas tools expect.
  repo_url: "https://github.com/tandemstream/core"

  # Worker tunables.
  worker_idle_sleep_seconds: 5
  max_attempts_per_commit: 3
  scip_build_timeout_seconds: 1200          # 20 min — generous for a cold tree
  ingest_shell_out_timeout_seconds: 1800    # 30 min — covers chunker on a large pass

# Note: the webhook HMAC secret is NOT in this file. The daemon reads
# GITHUB_WEBHOOK_SECRET from the environment (load via `.env` + your
# shell's `set -a; source .env; set +a` pattern). Refuses to start if
# unset.
